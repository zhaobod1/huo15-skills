type: swimlane
title: 采购审批流程（泳道图，PlantUML）

lanes:
  - name: 申请人
    steps:
      - { id: A1, label: 填写采购申请 }
      - { id: A2, label: 提交审批 }

  - name: 部门经理
    steps:
      - { id: B1, label: 初审 }
      - { id: B2, label: "是否 1 万以上?", shape: diamond }

  - name: 财务
    steps:
      - { id: C1, label: 预算复核 }

  - name: 总经理
    steps:
      - { id: D1, label: 终审批准 }

  - name: 系统
    steps:
      - { id: E1, label: 自动下单 }

edges:
  - [A1, A2]
  - [A2, B1]
  - [B1, B2]
  - [B2, C1, "是"]
  - [B2, E1, "否"]
  - [C1, D1]
  - [D1, E1]
